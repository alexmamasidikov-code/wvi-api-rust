openapi: 3.0.3
info:
  title: WVIHealth API
  version: 2.0.0
  description: Wellness Vitality Index API — 119+ endpoints for health monitoring

servers:
  - url: http://localhost:8091
    description: Development
  - url: https://api.wellex.ai
    description: Production

paths:
  /api/v1/health/server-status:
    get:
      summary: Server health check
      responses:
        '200':
          description: Server healthy
  /api/v1/wvi/current:
    get:
      summary: Get current WVI v2 score
      security:
        - bearerAuth: []
      responses:
        '200':
          description: WVI score with 12 metric breakdown
  /api/v1/biometrics/sync:
    post:
      summary: Bulk sync biometric data
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                records:
                  type: array
      responses:
        '200':
          description: Sync successful
  /api/v1/emotions/current:
    get:
      summary: Current emotion (fuzzy logic 18 states)
      security:
        - bearerAuth: []
  /api/v1/biometrics/recovery:
    get:
      summary: Recovery score (morning HRV vs baseline)
      security:
        - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
