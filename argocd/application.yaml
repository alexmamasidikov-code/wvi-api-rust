apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wvi-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/alexmamasidikov-code/wvi-api-rust.git
    targetRevision: master
    path: kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: wvi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
