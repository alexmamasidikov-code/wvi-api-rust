apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wvi-api-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1s"
spec:
  tls:
    - hosts:
        - api.wellex.ai
      secretName: wvi-api-tls
  rules:
    - host: api.wellex.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wvi-api
                port:
                  number: 8091
