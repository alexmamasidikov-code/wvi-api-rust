_format_version: "3.0"
services:
  - name: wvi-api
    url: http://api:8091
    routes:
      - name: wvi-api-route
        paths:
          - /api/v1
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: local
      - name: cors
        config:
          origins: ["https://6ssssdj5s38h.share.zrok.io"]
          methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
          headers: ["Authorization", "Content-Type"]
      - name: request-size-limiting
        config:
          allowed_payload_size: 5
      - name: bot-detection
      - name: ip-restriction
        config:
          allow: []
          # Empty = allow all. Add IPs to block specific ranges
      - name: response-transformer
        config:
          add:
            headers:
              - "X-Content-Type-Options:nosniff"
              - "X-Frame-Options:DENY"
              - "Strict-Transport-Security:max-age=31536000; includeSubDomains"
