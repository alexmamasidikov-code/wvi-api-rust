# Standalone compose for wvi-api — joins the shared wellex-net to reach
# the existing postgres, redis, traefik.
services:
  wvi-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: wvi-api:dev
    container_name: wvi-api
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://wvi:wvi_dev_2026@postgres:5432/wvi"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/1"
      RUST_LOG: "info,wvi_api=debug,tower_http=info"
      API_BIND: "0.0.0.0:8091"
      SERVER_URL: "https://wviapi.wellex.io"
      JWT_SECRET: "${WELLEX_API_JWT_SECRET}"
      SENTRY_DSN: ""
      PRIVY_APP_ID: "${PRIVY_APP_ID:-}"
      PRIVY_JWKS_URL: "https://auth.privy.io/api/v1/apps/${PRIVY_APP_ID:-}/jwks.json"
      TZ: "${TZ:-UTC}"
      RATE_LIMIT_PER_SEC_READ: "1000"
      RATE_LIMIT_PER_SEC_WRITE: "500"
    networks: [wellex-net]
    labels:
      wellex.tier: app
      wellex.service: wvi-api
      traefik.enable: "true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  wellex-net:
    external: true
